<!-- templates/layout/topbar.html -->
<div th:fragment="topbar">
    <div class="topbar-inner">
        <!-- ghostwhite 영역 -->
        <div class="topbar-actions-wrap">
            <ul class="topbar-actions">
                <!-- 개발팀 문의: 아이콘 + 텍스트 -->
                <li>
                    <a href="#" class="action action-notice updateNotice" title="개발팀 문의">
                        <i class="bi bi-headset"></i>
                        <span class="label">개발팀 문의</span>
                    </a>
                </li>

                <!-- 사용자정보: 아이콘만 -->
                <li>
                    <a href="#" class="action action-icon action-user myPage cursor_pointer" th:attr="data-gid=${gId}"
                        title="사용자정보" aria-label="사용자정보">
                        <i class="bi bi-person-circle"></i>
                        <span class="label">
                            <span th:text="${gName != null ? gName + '님' : ''}">사용자님</span>
                            <span th:if="${gLoginAuth == 'admin'}" style="color: red;">(관리자)</span>
                        </span>
                    </a>
                </li>

                <!-- 알림: 미읽음 뱃지 포함, common.js에서 페이지 로드 시 카운트 세팅 -->
                <li>
                    <a href="#" class="action action-icon action-alarm" title="알림" aria-label="알림" style="position:relative;">
                        <i class="bi bi-bell"></i>
                        <!-- 미읽음 알림 카운트 뱃지 (0이면 숨김) -->
                        <span class="alarm-badge badge badge-danger d-none"
                              style="position:absolute;top:2px;right:2px;font-size:.65rem;padding:2px 4px;border-radius:8px;"></span>
                    </a>
                </li>

                <!-- 로그아웃: 아이콘만 (기존 logoutBtn 유지) -->
                <li>
                    <a href="#" class="action action-icon logoutBtn" title="로그아웃" aria-label="로그아웃">
                        <i class="bi bi-box-arrow-right"></i>
                    </a>
                </li>
            </ul>
        </div>
        <div class="left" style="min-height: 44px;">
            <nav class="customBreadcrumb">
            </nav>
        </div>
    </div>
</div>
