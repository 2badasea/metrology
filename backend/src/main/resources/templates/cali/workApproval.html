<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}"
    xmlns:th="http://www.thymeleaf.org">

<body>
    <div layout:fragment="content">
        <div class="wrapper">
            <form class="searchForm mb-1" name="searchForm">
                <div class="d-flex flex-wrap align-items-center mb-1" style="gap: 4px;">

                    <!-- 좌측: 버튼 + 행 수 + 검색필터 -->
                    <div class="d-flex align-items-center flex-wrap" style="gap: 4px;">

                        <!-- 버튼 그룹 -->
                        <button type="button" class="btn btn-secondary btn-sm btnWriteReport">성적서작성</button>
                        <button type="button" class="btn btn-secondary btn-sm btnWaitChange">성적서대기변경</button>
                        <button type="button" class="btn btn-secondary btn-sm btnBulkEdit">통합수정</button>
                        <button type="button" class="btn btn-info btn-sm btnMultiApproval">성적서 다중결재</button>

                        <!-- 행 수 -->
                        <div class="input-group input-group-sm" style="width: auto;">
                            <div class="input-group-prepend">
                                <span class="input-group-text">행 수</span>
                            </div>
                            <select class="form-control form-control-sm rowLeng">
                                <option value="25" selected>25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                                <option value="200">200</option>
                            </select>
                        </div>

                        <!-- 검색필터1: 진행상태 (report_status) -->
                        <select class="form-control form-control-sm reportStatusFilter" style="width: auto;">
                            <option value="" selected>진행상태</option>
                            <option value="WAIT">대기</option>
                            <option value="WORK_RETURN">실무자반려</option>
                            <option value="APPROV_RETURN">기술책임자반려</option>
                            <option value="REUPLOAD">재업로드</option>
                            <option value="REPAIR">수리</option>
                            <option value="IMPOSSIBLE">불가</option>
                            <option value="CANCEL">취소</option>
                            <option value="COMPLETE">완료</option>
                        </select>

                        <!-- 검색필터2: 결재상태 (work_status), 기본 IDLE -->
                        <select class="form-control form-control-sm workStatusFilter" style="width: auto;">
                            <option value="IDLE" selected>결재상태</option>
                            <option value="READY">결재대기</option>
                            <option value="PROGRESS">결재진행중</option>
                            <option value="FAIL">결재실패</option>
                            <option value="SUCCESS">결재완료</option>
                        </select>

                        <!-- 검색필터3: 접수구분 -->
                        <select class="form-control form-control-sm orderTypeFilter" style="width: auto;">
                            <option value="" selected>전체</option>
                            <option value="ACCREDDIT">공인</option>
                            <option value="UNACCREDDIT">비공인</option>
                            <option value="TESTING">시험</option>
                        </select>

                        <!-- 검색필터4: 중분류 / 소분류 -->
                        <select class="select2 form-control form-control-sm middleCodeSelect"
                                style="width: 130px !important;">
                            <option value="">중분류전체</option>
                        </select>
                        <select class="select2 form-control form-control-sm smallCodeSelect"
                                style="width: 130px !important;">
                            <option value="">소분류전체</option>
                        </select>
                    </div>

                    <!-- 우측: 키워드 검색 -->
                    <div class="ml-auto d-flex align-items-center" style="gap: 4px;">
                        <div class="input-group input-group-sm">
                            <select class="form-control form-control-sm searchType" name="searchType">
                                <option value="">전체선택</option>
                                <option value="reportNum">성적서번호</option>
                                <option value="custAgent">신청업체</option>
                                <option value="reportAgent">성적서발행처</option>
                                <option value="workMember">실무자</option>
                                <option value="approvalMember">기술책임자</option>
                                <option value="itemName">기기명</option>
                                <option value="itemFormat">형식</option>
                                <option value="itemMakeAgent">제작회사</option>
                                <option value="itemNum">기기번호</option>
                                <option value="manageNo">관리번호</option>
                            </select>
                            <div class="input-group-append">
                                <input type="text" class="form-control form-control-sm" id="keyword" name="keyword" value="" />
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>

                </div>
            </form>

            <!-- 파일 선택 input (숨김 — 업로드 버튼 클릭 시 trigger) -->
            <input type="file" id="uploadFileInput" accept=".xlsx,.xls" style="display: none;" />

            <div class="grid workApprovalList"></div>
        </div>
    </div>
</body>

</html>
