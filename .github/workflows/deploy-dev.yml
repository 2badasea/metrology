name: Deploy Dev

# ── 트리거 ────────────────────────────────────────────────────
# workflow_dispatch: Actions 탭에서 수동으로만 실행
# → develop 브랜치에 feature 병합이 끝나고 준비됐을 때만 배포
on:
  workflow_dispatch:
    inputs:
      reason:
        description: "배포 사유 (예: 회원가입 기능 통합 테스트)"
        required: false
        default: ""

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Backend 빌드 ──────────────────────────────────────────

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Gradle 의존성 캐시: 동일한 build.gradle 구성이면 재다운로드 생략 → 빌드 시간 단축
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Build Backend JAR
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar

      # ── Frontend 빌드 ─────────────────────────────────────────
      # Node 캐시는 setup-node의 cache: npm 으로 처리 (package-lock.json 해시 기준)

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend dist
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── 서버 임시 디렉토리 준비 ───────────────────────────────

      - name: Prepare remote temp dirs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_PORT }}
          script: |
            mkdir -p /tmp/cali /tmp/cali-admin

      # ── 빌드 결과물 서버 전송 ─────────────────────────────────

      - name: Copy backend JAR
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_PORT }}
          source: "backend/build/libs/*.jar"
          target: "/tmp/cali/"
          strip_components: 3

      - name: Copy frontend dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_PORT }}
          source: "frontend/dist/*"
          target: "/tmp/cali-admin/"
          strip_components: 2

      # ── 배포 및 서비스 재시작 ─────────────────────────────────

      - name: Deploy + restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_PORT }}
          script: |
            set -e

            # 배포 메타 정보 출력 (Actions 로그에서 추적용)
            echo "▶ Deploy reason : ${{ github.event.inputs.reason }}"
            echo "▶ Triggered by  : ${{ github.actor }}"
            echo "▶ Commit SHA    : ${{ github.sha }}"

            # 1) 이전 JAR 백업 (헬스체크 실패 시 롤백용)
            sudo cp /opt/cali/backend.jar /opt/cali/backend.jar.bak 2>/dev/null || true

            # 2) backend JAR 교체
            sudo mkdir -p /opt/cali
            JAR_PATH=$(ls -1 /tmp/cali/*.jar | head -n 1)
            sudo cp "$JAR_PATH" /opt/cali/backend.jar
            sudo chown www-data:www-data /opt/cali/backend.jar

            # 3) frontend dist 반영 (--delete: 구버전 파일 자동 제거)
            sudo mkdir -p /var/www/cali/admin
            sudo rsync -av --delete /tmp/cali-admin/ /var/www/cali/admin/
            sudo chown -R www-data:www-data /var/www/cali/admin

            # 4) 서비스 재시작
            sudo systemctl restart cali-dev
            sudo systemctl reload nginx

      # ── 헬스체크 ─────────────────────────────────────────────
      # /actuator/health 에서 HTTP 200 응답이 올 때까지 최대 60초 대기
      # 실패 시 백업 JAR로 롤백 후 서비스 재시작

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_PORT }}
          script: |
            set -e
            echo "Waiting for app to start..."

            # 5초 간격 × 12회 = 최대 60초 대기
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "✔ Health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i/12 — HTTP $STATUS, retrying in 5s..."
              sleep 5
            done

            # 60초 이내에 200 응답 없으면 롤백
            echo "✘ Health check failed — rolling back to previous JAR..."
            sudo cp /opt/cali/backend.jar.bak /opt/cali/backend.jar 2>/dev/null || true
            sudo chown www-data:www-data /opt/cali/backend.jar
            sudo systemctl restart cali-dev
            exit 1
